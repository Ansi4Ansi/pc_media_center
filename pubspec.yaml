name: pc_media_center
description: "PC Media Center — fullscreen desktop launcher for apps, games, movies and media."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Routing
  go_router: ^17.2.1

  # Dependency injection
  get_it: ^9.2.1
  injectable: ^2.5.0

  # Database
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1

  # Network
  dio: ^5.7.0
  cached_network_image: ^3.4.1

  # Serialization
  json_annotation: ^4.9.0

  # i18n
  intl: any

  # File picker
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  injectable_generator: ^2.7.0
  json_serializable: ^6.9.4

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
